<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f1f5f9;color:#1e293b;display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */

#sidebar-header{padding:20px 16px 14px;border-bottom:1px solid #1e293b}

#nav-list li.sep{height:1px;background:#1e293b;margin:8px 12px}
#nav-list li.nav-item a{display:block;padding:8px 16px;color:#94a3b8;text-decoration:none;font-size:13px;border-radius:0;transition:background .15s,color .15s;line-height:1.4}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#toolbar{padding:14px 24px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:12px;flex-shrink:0}
#toolbar h2{font-size:16px;font-weight:700;color:#0f172a;min-width:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#search{padding:7px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:13px;width:260px;outline:none;background:#f8fafc}

#content{flex:1;overflow-y:auto;padding:20px 24px}

/* ── Cards ── */
.cards-grid{display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.card-header{padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none}
.card-header:hover{background:#f8fafc}
.card-scenario{flex:1;font-weight:600;font-size:14px;color:#0f172a;line-height:1.4;white-space:pre-line}
.card-pic{flex-shrink:0;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em;margin-top:2px}
.card-chevron{color:#94a3b8;font-size:12px;margin-top:3px;flex-shrink:0;transition:transform .2s}
.card-chevron.open{transform:rotate(180deg)}
.card-body{display:none;padding:0 16px 16px;border-top:1px solid #f1f5f9}
.card-body.open{display:block}
.field{margin-top:14px}
.field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:5px}
.field-value{color:#1e293b;line-height:1.7;white-space:pre-wrap;word-break:break-word;font-size:13.5px}
.field-value a{color:#2563eb;text-decoration:none}
.field-value a:hover{text-decoration:underline}
.field-link{display:inline-block;margin-top:6px;padding:4px 10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;color:#1d4ed8;font-size:12px;font-weight:600;text-decoration:none}
.field-link:hover{background:#dbeafe}

/* PIC colors */

.pic-ruru{background:#fce7f3;color:#9d174d}
.pic-jeremy{background:#fef3c7;color:#92400e}

.pic-mye{background:#dbeafe;color:#1e40af}
.pic-multi{background:#f1f5f9;color:#475569}

/* ── Tables (Index / Contactor / SM) ── */
.page-title{font-size:18px;font-weight:700;color:#0f172a;margin-bottom:18px}

.data-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.data-table th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748b;border-bottom:1px solid #e2e8f0;white-space:nowrap}
.data-table td{padding:10px 14px;border-bottom:1px solid #f1f5f9;vertical-align:top;font-size:13px;line-height:1.6;word-break:break-word}
.data-table tr:last-child td{border-bottom:none}
.data-table td a{color:#2563eb;text-decoration:none}
.data-table td a:hover{text-decoration:underline}

.sm-table td{padding:8px 12px;border-bottom:1px solid #f1f5f9;font-size:12px;word-break:break-all;max-width:180px;vertical-align:top}

.sm-table td:first-child{font-weight:600;white-space:nowrap;word-break:normal;max-width:none}
.sm-table td a{color:#2563eb;font-size:11px}
.dash{color:#cbd5e1}
.empty-state{padding:60px 24px;text-align:center;color:#94a3b8}
.empty-state .icon{font-size:36px;margin-bottom:12px}

nd Budget Sheet link with submission deadline\n2. Local team uses Template to write quarterly marketing plan (strategy overview, KPI summary, details for Peak Day / SOL / CCP / Esports campaigns)\n3. Local team adds a new tab in the Budget Sheet, filling in monthly amounts, budget logic, and KPIs for each line item\n4. Submit by the first half of the 3rd month of the previous quarter\n5. Regional reviews and provides feedback or approval\n6. Regional consolidates all markets and submits HQ S&M budget request in the second half of the 3rd month of the previous quarter","prepare":"Marketing Plan PPT (use Regional Template):\nStrategy overview (incl. context analysis), KPI summary, budget overview, detailed campaign plans — must include: Peak Day Campaigns, SOL DAU Enhancement, CCP, eSports\n\nBudget Sheet (add new tab): Each item must include:\nMonthly breakdown / Total / Budget request reason & logic / KPI\n\nNote: Markets that do not apply for S&M budget only need to submit the Marketing Plan PPT","timeline":"Start drafting: 2nd month of previous quarter\nSubmit by: first half of 3rd month of previous quarter","qa":"Q: Can the plan template content (new patch/season info) be shared externally?\nA: No. New season content and Esports schedules are highly confidential (strict need-to-know). Never share with anyone outside the authorized list.\n\nQ: Does every budget item need a KPI?\nA: Yes. Each item must include budget request reason & logic + corresponding KPI — required for HQ submission. Missing this will result in a revision request.","links":"Budget Sheet / Plan Template (provided by Regional via email each quarter)"},{"scenario":"Peak Day Campaign Closing Report","pic":"Ruru","steps":"1. Start collecting data immediately after Peak Day ends\n2. Write report using Regional's Post Event Template\n3. Submit to Regional by Friday of the same week (reply with attachment)\n4. Regional consolidates all market reports and sends a cross-market learning summary before the next quarter's plan","prepare":"Section 1 – Overview:\n① DAU data: A1 DAU on Peak Day (incl. WoW%, new users, PEAK CCU, no_play_30d) + A7 (same day of Peak Day week)\n② Actual budget breakdown by S&M category\n③ Top campaigns worth sharing (max 5)\n④ Executive Summary: 1–2 sentences on market conditions, KPI vs target, biggest highlight, and #1 learning for the next Peak Day\n\nSection 2 – Per Campaign:\n① Objective ② What we've done (timeline, # KOLs, budget, channels) ③ Performance vs benchmark (KOLs / Content / Budget / Views / CPM/CPV) ④ Key Highlights ⑤ Learnings ⑥ Optimization Plan for next Peak Day","timeline":"Start immediately after Peak Day ends → submit by Friday of the same week","qa":"Q: Should the report cover all campaigns?\nA: All overall exposure data should be included. For campaign insights, focus on key campaigns and actionable learnings useful for future planning.","links":"Post Event Template (provided by Regional via email each time)"},{"scenario":"Quarterly Marketing Report","pic":"Ruru","steps":"1. In the beginning of the first month of each quarter, Regional PIC notifies all markets to prepare the previous quarter's report, sharing the required format and deadline\r\n2. Each Local team collects previous quarter data across all four sub-areas: Social Media, CCP, Paid KOL, and Esports\r\n3. Fill in the designated format and submit (future state: upload data via Dashboard, with AI-assisted report generation)\r\n4. Submit to Regional PIC by the 4th Friday of the first month of each quarter","prepare":"① Social Media (Sub-PIC: Mye)\n- Per platform (FB / IG / TikTok / YT): post reach, engagement rate, net follower growth\n- Top content category analysis: top 3 content types by engagement\n- Overall player sentiment overview (% positive / neutral / negative)\n- Seasonal DF community trending topics / memes for future engagement campaigns\n- Learning and next step for next quarter\n\n② CCP (Sub-PIC: Hua)\n- Total Views\n- Total No. of Creators (active creators in the quarter)\n- Content type breakdown: % SOL / WF / Other Content\n- Delta Tickets Assigned vs. Issued\n- Budget Spending\n- Learning and next step for next quarter\n\n③ Paid KOL (Sub-PIC: Ruru), sorted by campaigns\n- Total Views\n- Average CPV\n- Budget Spending\n- Learning and next step for next quarter\n\n④ Esports (Sub-PIC: Hua)\n- Total tournaments held in the quarter\n- Total Participants\n- Total Viewership\n- Total Social performance\n- Learning and next step for next quarter","timeline":"Regional PIC sends preparation notice to all markets in Week 1 of first month of each quarter → local submission deadline is 4th Friday of first month of each quarter\n\np.s Dashboard is built for local data upload + AI-assisted report generation","qa":"Q: Will the report format change in the future?\nA: Yes. A Dashboard is planned to allow local teams to upload data, with AI assistance to auto-generate the report.\n\nQ: How is the Marketing Quarterly Report different from each sub-area's own monthly/quarterly reports?\nA: In the future, there's only Marketing Quarterly Report and Closing Reports of Peak Day Campaigns.","links":"Dashboard (to be provided once built)"}],"tab2":[{"scenario":"OM Strategy\nPerformance Alignment","pic":"Jeremy","steps":"1. During quarterly planning, Regional and Jeremy confirm OM NU KPI targets per market\n2. Break down daily NU and CPR targets based on quarterly goals\n3. During daily execution, if Local team encounters OM performance issues or questions, contact Jeremy directly","prepare":"Quarterly NU targets (from Budget Plan)\nHistorical OM CPR benchmarks","timeline":"Discussed alongside quarterly plan (first half of 3rd month of previous quarter)","qa":"Q: Who to contact when daily OM performance is underperforming?\nA: Contact Regional PIC Jeremy directly","links":"—"},{"scenario":"Spark Ads KOL Link Submission","pic":"Jeremy","steps":"Spark Ads KOL Link: Regional periodically requests KOL post links from each market; local teams can also proactively submit links to Jeremy","prepare":"KOL post link + Spark Ads Authorization Code","timeline":"As needed; Spark Ads links should be submitted within 1–2 days after the KOL posts to avoid missing the boosting window","qa":"Q: How to get the authorization code?\nA:\n1. Enable Ad Authorization: Before generating a Spark Ad code, ensure that ad permissions are activated. Navigate to your TikTok settings, then to 'Creator tools' and toggle on 'Ad settings'. TikTok Spark Codes look like this: #s63DdePaj9HjSv2BPcSrDfTxU2X506b2oiwchQ9PIspTLgroZKtjN7PPiFnF+qA=\n\n2. Authorize specific video creative for promotion:\nChoose the video and tap the '...' icon located at the bottom right corner.\nIn the menu that appears, scroll and select 'Ad settings'.\nWithin the 'Ad settings' menu, toggle on the 'Ad authorization' option.\n\n3. Get the video code of a post\nSet Authorization Duration: Decide on the duration for which you want to grant the brand permission to promote your video. TikTok offers a default period of 30 days, but this can be adjusted between 7 to 365 days based on your preference.\nGenerate the Code: After setting the desired duration, tap 'Generate code'.\nShare the Code: Once generated, you can copy the code and share it directly with the brand via TikTok's messaging system or through external communication channels like email.","links":"—"},{"scenario":"Post Boosting","pic":"Jeremy","steps":"1. Local team fills in the OM Post Boosting Google Sheet: post name, platform, link, budget, duration, TA settings, and category\n2. Jeremy reviews and configures the ad setup\n3. Regional provides an Ads Set-up screenshot for confirmation","prepare":"Post link / Authorization Code (Spark Ads)\nFacebook/IG: Budget, Duration, TA settings (Age / Gender / Location / Interest tags), Category (S+A tier / Esports / B tier, etc.)\n\nNote: Minimum age must be 20+. TikTok does not support game name as a TA — confirm available tags before submitting.","timeline":"Submit at least 1–2 days before desired boost start date\nFor livestream boosting: submit before broadcast begins","qa":"Q: Will the Post Boosting process change in the future?\nA: Currently managed by Jeremy. A self-service web tool is being developed to allow local teams to configure and manage ads directly — permissions will open to markets once ready.","links":"Post Boosting Google Sheet (provided by Jeremy or Regional each month)"}],"tab3":[{"scenario":"Non-IP Social Media Asset Review (Operator Appearance)","pic":"Tim","steps":"1. Local fills in the Out-of-game Asset Review Google Sheet (columns B–H) and uploads assets to the designated folder\n2. Regional (Tim) consolidates daily and submits to TC\n3. TC feedback is translated and updated in column N\n4. Regional sends email notifications to all markets twice daily: 11:00–12:00 and 18:00–19:00 GMT+8\n5. Assets can only be published after approval","prepare":"Column B – Region: Applicant's market\nColumn C – Attach the pic: Attach image directly (not a folder link)\nColumn D – What's the asset for: Asset purpose (Engagement / Esports / Local event / Others)\nColumn E – Usage: Specific use description\nColumn F – Assets link: Paste direct image link — not a folder link\nColumn G – release date: Planned publish date\nColumn H – note your mail: Responsible person's email for direct notification reply","timeline":"TC review takes ~1 business day, but back-and-forth revisions may occur — submit at least 3 business days before the planned publish date","qa":"Q: Which assets require review?\nA: Any asset that modifies an operator's appearance: costume changes, fan art comics, Chibi-style illustrations, memes with operator elements. When in doubt, always submit. Plain text translation does not require review.\n\nQ: Most common reasons for TC rejection?\nA: ① Too AI-generated in appearance (TC is sensitive to obvious AI art — if AI tools are used, refine the output so it doesn't look AI-generated); ② Compositing real human faces with operators (prohibited); ③ Content involving political, religious, sexual, or gambling themes; ④ Competitor references or elements inconsistent with brand identity.\n\nQ: If an approved asset is only resized or has translated copy, does it need re-review?\nA: No, but localized copy must be sent back to Regional for collection.\n\nQ: Can we tell users the nationality of the operators?\nA: No, we can not include \"nationality\" and \"nation flags\" in all posting.","links":"[DF] Non IP asset review"},{"scenario":"In-game Asset Review (All In-game Visuals — No Exceptions)","pic":"Mye","steps":"1. Local fills in the In-game Asset Review Google Sheet (columns B–I) and uploads assets to the designated folder\n2. Regional (Mye) consolidates daily and submits to TC\n3. TC feedback (with Chinese translation) is updated in column K\n4. Regional sends email notifications to all markets twice daily: 11:00–12:00 and 18:00–19:00 GMT+8\n5. Assets can only go live after approval","prepare":"Column B – Region: Applicant's market\nColumn C – What's the asset for: Asset type (Ingame Banner / Popup / Entrance / Background / Radio, etc.)\nColumn D – Usage: Usage category (Esports / Local event / Activeness / KOL event, etc.)\nColumn E – Assets link: Paste direct image link — not a folder link\nColumn F – Attach the pic: Attach asset preview image\nColumn G – release date: Planned go-live date\nColumn H – note your mail: Responsible person's email\nColumn I – Activity description (Chinese): Brief event background for TC's reference","timeline":"Submit at least 3 business days before go-live date\nIf assets are revised, re-submission requires another full review cycle (same-day two-batch turnaround)","qa":"Q: Do all in-game assets require review, even minor revisions?\nA: Yes — no exceptions for in-game assets. All must be submitted for review.\n\nQ: Most common reasons for TC rejection?\nA: ① Too AI-generated (TC is increasingly sensitive — refine until it doesn't l be added once fully set up.","links":"[DF] GA MKT Sheet - External"}],"tab4":[],"tab5":[{"scenario":"Regional Press Release — Localization","pic":"Ruru","steps":"1. Ruru provides TC- and Garena Reg PR-approved press release\n2. Distribute to each Local team for localization (translation + local adaptation) and publish","prepare":"No preparation needed — Regional will proactively provide the press release\nLocal only needs to execute localization","timeline":"Follow the embargo timeline specified by Regional\nDo not publish early under any circumstances","qa":"Q: Can local teams add or modify content during localization?\nA: Mostly translation and rewording only. If additional local information needs to be added, confirm with Ruru first — any additions must be submitted for TC review.","links":"02 - PR"},{"scenario":"Local-Authored Press Release — Review & Approval","pic":"Ruru","steps":"If market has a Local PR team:\n1. Local writes press release in local language + English\n2. Submit to Local PR team for review first\n3. After Local PR approval, submit to Regional PIC\n4. Regional PIC submits to TC for review (~3 business days)\n5. Publish after TC approval\n\nIf market has no Local PR team:\n1. Local writes press release in local language + English\n2. Submit directly to Regional PIC\n3. Regional PIC submits simultaneously to Garena Reg PR and TC for review (provide both EN + local language)\n4. Publish after both approvals","prepare":"Press release in local language + English version (both are required)","timeline":"Garena Reg PR and TC reviews each take ~3 business days\nBoth may be submitted simultaneously depending on content type","qa":"Q: Is the English version mandatory?\nA: Yes — Reg PR and TC both review based on the English version. Without it, the review cannot proceed.\n\nQ: What does TC typically scrutinize?\nA: Brand tone, sensitive topics (politics, religion, etc.), data accuracy (no errors in numbers or reward descriptions), and whether any unreleased game information is disclosed.","links":"02 - PR"}],"tab7":[{"scenario":"Tournament Plan Submission","pic":"Hua","steps":"1. Fill in the Mastersheet 'Tournament Details' tab (columns A–Y) monthly\n2. Notify Regional PIC via Seatalk\n3. After the tournament ends, fill in performance data (columns V–Z) when the quarterly report submitted","prepare":"Tournament details: name, date, prize pool, KPIs, format, etc.\nColumns A–Y: tournament planning information\nColumns V–Z: post-event performance data (fill in when local teams are preparing the quarterly report)","timeline":"Fill in at least 2 weeks before the tournament","qa":"Q: Which columns do I need to fill?\nA: Columns A–Y for tournament planning info; after the event ends, fill V–Z with performance data","links":"[DF_Regional]2026 Esports Ecosystem Mastersheet"},{"scenario":"Custom Room Request","pic":"Hua","steps":"1. Local fills in the Custom Room request form before each month 25th\n2. Regional PIC reviews and submits to TC\n3. TC activates the room and notifies Local","prepare":"Tournament / activity details: date, number of participants, game rules, etc.","timeline":"Submit the list monthly (before 25th in each month for next month's application)","qa":"Q: What's the difference between Custom Room and Esports Server Account?\nA: Custom Room is a customizable in-game lobby within the live game version; Esports Server Account is a dedicated tournament server account used for official esports events.","links":"[DF] Custom room permissions"},{"scenario":"Esports Server Account Request (PC & Mobile — Same Process)","pic":"Hua","steps":"1. Local fills in the request form (PC and mobile use the same form)\n2. Regional PIC reviews and submits to TC\n3. TC activates accounts and notifies Local\n4. If accounts need to be reused for the same tournament, Local submits the accounts to be reset to Regional PIC\n5. Regional PIC notifies TC to perform the reset (~3 business days)","prepare":"Tournament name, number of accounts needed, usage period","timeline":"Request: Submit the list monthly (before 25th in each month for next month's application)\nAccount reset: ~3 business days","qa":"Q: Is the mobile request form the same as PC?\nA: Yes — both use the same request form.\n\nQ: Can accounts be reused for the same tournament?\nA: Yes, but submit a reset list to Regional PIC. Reset takes ~3 business days.\n\nQ: Does a mobile patch update affect the esports server?\nA: Mobile and PC patch timelines are synchronized — keep patch schedules in mind when planning events.","links":"[DF]PC Esports Server Account Application"}],"tab8":[{"scenario":"BD Cross-Industry Partnership Proposal","pic":"Tim, Mye","steps":"1. Local fills in the application form (Status / Region / Proposer / Submission Date / Brand intro / Collaboration direction & details / Launch period / Evaluation Deadline)\n2. Regional (Mye) consolidates and submits to TC in weekly batches\n3. TC reviews (~10 business days)\n4. TC responds: Approved / Rejected / Requires supplementary info\n5. If approved and virtual item rewards are involved, proceed to the virtual item reward application process (Tab 9)","prepare":"Column E: Brand website link + brand introduction (incl. target audience and scale)\n\nColumn F — three parts:\n① Collaboration format (co-branded skin / item / event / promotional content)\n② Collaboration details (what each party provides and receives)\n③ Expected results (estimated reach, media exposure)","timeline":"At least 3 weeks in advance (including TC review of ~10 business days)","qa":"Q: Common reasons for TC rejection?\nA: Brand image inconsistent with Delta Force's identity, or brand has been involved in negative incidents. TC evaluates from a global perspective — not just local market context.","links":"[DF] In-game Item Request for MKT Campaigns & Partnership Review"},{"scenario":"IP Collaboration (Regional-Led, Local Execution)","pic":"Mye","steps":"1. Regional leads licensing scope and timeline negotiations with the IP partner\n2. Create a dedicated email thread for tracking communication and share a Collab Summary document\n3. Local team receives the brief and executes localized promotion (KV application, social posts, PR, KOL collaboration, etc.)\n4. All assets must be reviewed by Regional during execution — Leak Prevention is strictly enforced. No IP information may be disclosed before official launch.\n5. After launch, compile the Collab Summary and save to the shared folder","prepare":"Each IP collaboration will include:\n① Dedicated email thread (Regional + Local + IP partner)\n② Collab Summary (background, collaboration content, each market's execution items, results)\n③ Asset folder (KV, video, licensed materials)\n*All IP-related stuff can be referred to the collab summary email- [Confidential] [DF] (IP Name) Collaboration Summary\n\nLocal must prepare:\nPromo Plan (planned activities: KOL, Cosplay, UGC, social posts, etc.)\nSelf-produced assets (if any) must be submitted for review in advance\nKOL list must be submitted for review simultaneously","timeline":"Depends on IP contract — typically 6–8 weeks before launch to brief Local teams\nAsset review: submit at least 1 week before planned publish date","qa":"Q: What's the most important thing to watch out for?\nA: Leak Prevention. A past leak incident seriously damaged the trust relationship with TC and the IP partner. All unreleased information must not be discussed on any public or unauthorized channel — including personal social media.\n\nQ: Can assets be shared with partners or creators before launch?\nA: No — all pre-launch assets are confidential.\n\nQ: Does resizing an approved asset or translating approved copy require re-review?\nA: No, but localized copy must be sent back to Regional for collection.","links":"21 - IP collaboration"}],"tab9":[{"scenario":"In-game Items Requirement\n(Community / Partnership / Esports)","pic":"Tim, Hua","steps":"1. Fill in the Application Google Sheet (see Related Links):\n   - In-game mail distribution: fill columns A–N\n   - AMS/CDK distribution: fill columns A–R\n2. After completing the form, tag Regional PIC in the Google Sheet or notify via Seatalk\n3. Regional reviews and submits to TC upon approval\n4. Only start AMS/CDK production after TC approves","prepare":"Column B: Distribution method (AMS = H5 in-game delivery; CDK = suitable for social media distribution)\nColumn G: Claim Range (if CDK is posted publicly, it's treated as available to all server players)\nColumn H: Event Rule (explain the marketing activity and the reason for requesting the items)\nColumn I: Expected Performance (impressions, viewership, PCV, offline participants, etc.)\nColumns J–N: Item info — example: distributing Turbrick×2 to 500 players → Column L = 2, Column M = 500, total distributed = 1,000 items","timeline":"Review: Regional 1 business day + TC 1 business day\nAMS/CDK production: TC produces once per week — submit by end of Tuesday; items ready that Friday. Late submissions must wait until the following week.","qa":"Q: Can we freely choose which items to give as rewards?\nA: No — TC approval is still required regardless of item type.\n\nQ: How should rewards be selected?\nA: Revenue items (incl. DT, legendary skin) can only be distributed in small quantities. Prefer consumable items — refer to the available item list for guidance.","links":"[DF] In-game Item Request for MKT Campaigns & Partnership Review"}],"tab10":[{"scenario":"Monthly Performance Data Submission","pic":"Hua","steps":"Monthly Data:\n1. After each month ends, compile that month's performance data\n2. Submit to Regional PIC","prepare":"Total Views; Total No. of Creators; % SOL / WF / Other Content; Delta Tickets Assigned / Issued; Budget Spending","timeline":"Monthly data: within 1 week after month ends","qa":"Q: Can I submit approximate figures if data isn't confirmed?\nA: Yes, but mark them as approximate (～) in the notes. Notify Regional to update once confirmed.","links":"CCP Post-Mortem Template (link provided by Regional PIC)"}],"tab11":[{"scenario":"Website Issue Handling & Escalation","pic":"Ruru","steps":"1. Identify issue type:\n   - Self-manageable issues (e.g., content updates, page settings) → resolve independently\n   - Site-wide issues (e.g., functional errors, system failures) → contact Regional PIC\n2. Regional PIC coordinates with SE team to investigate and resolve","prepare":"Issue description, screenshots or error messages, time of occurrence, scope of impact","timeline":"Report immediately when an issue occurs","qa":"Q: What counts as a 'site-wide issue' requiring Regional involvement?\nA: Issues affecting the entire website or multiple markets — not a market-specific configuration problem. Examples: page fails to load, site-wide functional failure, system-level errors.","links":"—"}],"tab12":[{"scenario":"Store Graphics Localization (Apple Store + Google Play)","pic":"Ruru","steps":"1. Regional PIC sends localization brief with DDL, Mastersheet link, banner/video copy scripts, and Word Card template (PSD)\n2. Local completes Word Card localization first — this can be done before TC's background assets arrive\n3. After TC provides background assets, Local completes banner and video production\n4. Local uploads all final assets to Mastersheet by DDL","prepare":"Localized copy (banner text, video subtitles)\n\nSize specifications:\nBanner:\n- Google Play: 2208x1242 (1 image)\n- Apple Store: 2732x2048 (iPad13), 2688x1242 (6.5\"), 2208x1242 (5.5\") — 3 images total\n\nVideo:\n- Google Play: 2400x1080, <500MB, max 30 sec, MP4 (1 video)\n- Apple Store: 1920x886, 1920x1080, 1600x1200 — H.264, <500MB, max 29 sec, MP4 (3 videos total)","timeline":"Timelines are usually tight — typically only 1–2 business days for localization\nBook design resources in advance","qa":"Q: Can we start production before TC's background assets arrive?\nA: Yes — start with the Word Card localization using the PSD template provided in the brief.\n\nQ: What formats need to be submitted?\nA: Both Apple Store and Google Play require banners and videos — specifications are listed in each round's Mastersheet.","links":"06 - Store Assets"},{"scenario":"Early Access Server Arrangement for KOL Preview","pic":"Tim","steps":"1. Regional PIC notifies each Local of the Early Access window, account list (Google Sheet), and client download method (PC Launcher / Android APK)\n2. Local MKT selects accounts from the list for their region, assigns to KOLs, and marks 'allocated' in column H of the list\n3. Regional PIC notifies TC to send virtual item rewards to the accounts (typically on the evening Early Access opens)\n4. KOLs log in using the TIMI Global PC Launcher or the Android APK provided by Regional","prepare":"PC Launcher: https://www.playdeltaforce.com/download/DeltaForceMiniloader.official.exe\nAndroid APK: provided by Regional PIC in the notification","timeline":"Regional PIC typically sends notification 1 day before Early Access opens","qa":"Q: What if there aren't enough accounts?\nA: Use the Spare accounts listed in the account sheet.\n\nQ: Which launcher should KOLs use to log in?\nA: Must use the TIMI Global PC Launcher — the Garena Launcher does not have the Early Access branch.\n\nQ: Which game modes are available on the Early Access server?\nA: Determined by TC — some modes may be unavailable if conditions are not met.","links":"[DF] MO Launch Marketing Plan"},{"scenario":"In-game Event Calendar (Internal — Confidential)","pic":"Ruru","steps":"Regional PIC shares access to the event calendar with Local\nLocal checks the calendar regularly to review upcoming in-game event schedules","prepare":"—","timeline":"—","qa":"Q: Can the event calendar information be shared externally?\nA: No — this is an internal confidential document. Keep strictly confidential to prevent early leak of event info.","links":"[DF] Patch Calendar"},{"scenario":"Post-Patch Social Sentiment Collection","pic":"Ruru","steps":"During the first week after each patch update:\nCollect social sentiment data across all platforms daily at 17:00 GMT+8 → fill in the designated Sheet","prepare":"Social platform data from all channels\nSheet link provided by Regional PIC at each patch update","timeline":"Daily execution throughout the first week after each patch update","qa":"—","links":"Sheet link provided by Regional PIC at each patch update"}],"tab13":[{"scenario":"Apple Store IAE\nGoogle Play LOC\nLocalization","pic":"Ruru, Jeremy","steps":"1. Regional PIC reviews IAE & LOC items before each new season and notifies Local via Mastersheet\n2. Local fills in localized copy (title, short description, full description)\n3. Local provides localized assets (if required)\n4. Regional PIC consolidates and submits to both platforms","prepare":"Localized copy — character limits:\n- Title: max 30 characters\n- Short description: max 50 characters\n- Full description: max 120 characters\n\nAsset dimensions:\n- IAE (Apple Store): 1920x1080\n- LOC (Google Play): 1080x1920 & 1080x1080","timeline":"Regional PIC notifies before each new season — Local should complete localization by the given DDL\nAdditional recommendations are handled case by case and are usually time-sensitive","qa":"Q: What's the difference between IAE and LOC?\nA: IAE (In-App Event) is Apple Store's event feature recommendation slot; LOC is the equivalent event recommendation mechanism on Google Play.","links":"Store Feature"}]}};

// ── PIC badge helper ──────────────────────────────────────────
function picClass(pic){
  const p = (pic||'').toLowerCase();
  if(p.includes(',') || (p.includes('tim') && p.length > 5)) return 'pic-multi';
  if(p.includes('tim'))    return 'pic-tim';
  if(p.includes('ruru'))   return 'pic-ruru';
  if(p.includes('jeremy')) return 'pic-jeremy';
  if(p.includes('hua'))    return 'pic-hua';
  if(p.includes('mye'))    return 'pic-mye';
  return 'pic-multi';
}

// ── Link detector ─────────────────────────────────────────────
function linkify(text){
  if(!text) return '';
  const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

// ── Render helpers ────────────────────────────────────────────
function field(label, value){
  if(!value || value === '—') return '';
  return `<div class="field">
    <div class="field-label">${label}</div>
    <div class="field-value">${linkify(value)}</div>
  </div>`;
}

function renderCards(rows, query){
  if(!rows || rows.length === 0)
    return `<div class="empty-state"><div class="icon">📭</div><p>No content yet — check back later.</p></div>`;
  const q = (query||'').toLowerCase();
  const filtered = rows.filter(r => {
    if(!q) return true;
    return Object.values(r).some(v => (v||'').toLowerCase().includes(q));
  });
  if(filtered.length === 0)
    return `<div class="no-results">No results for "<strong>${q}</strong>"</div>`;
  return `<div class="cards-grid">${filtered.map(r => {
    const hasLinks = r.links && r.links !== '—';
    return `<div class="card">
      <div class="card-header" onclick="toggleCard(this)">
        <div class="card-scenario">${r.scenario||'(Untitled)'}</div>
        <span class="card-pic ${picClass(r.pic)}">${r.pic||''}</span>
        <span class="card-chevron">▼</span>
      </div>
      <div class="card-body">
        ${field('Process Steps', r.steps)}
        ${field('What to Prepare', r.prepare)}
        ${field('Timeline', r.timeline)}
        ${field('Common Q&A', r.qa)}
        ${hasLinks ? `<div class="field"><div class="field-label">Related Links</div><div class="field-value">${r.links_url ? `<a href="${r.links_url}" target="_blank" rel="noopener" class="field-link">${r.links}</a>` : linkify(r.links)}</div></div>` : ''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function tabIdFromName(name){
  const m={
    'Contactor':'_contactor','SM Links':'_sm',
    'Budget & Plan':'tab1','OM':'tab2','Assets':'tab3',
    'Social Media':'tab4','PR':'tab5','Esports':'tab7',
    'Cross-Industry & IP Partnerships':'tab8','Virtual Item Rewards':'tab9',
    'CCP':'tab10','Website':'tab11','Patch Updates':'tab12','Store':'tab13'
  };
  return m[name]||null;
}

function renderIndex(rows){
  return `<p class="page-title">Tab Index</p>
  <table class="data-table">
    <thead><tr><th style="width:48px">Tab</th><th style="width:180px">Name</th><th>Description</th></tr></thead>
    <tbody>${rows.map(r=>{
      const tid=tabIdFromName(r.name);
      const nameEl=tid
        ? `<a href="#" onclick="navigate(\'${tid}\');return false;" style="color:#2563eb;font-weight:600;text-decoration:none">${r.name} ↗</a>`
        : `<span style="font-weight:600">${r.name}</span>`;
      return `<tr>
        <td><span class="tag">${r.tab}</span></td>
        <td>${nameEl}</td>
        <td style="color:#475569">${r.desc}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function smCell(val){
  if(!val || val==='—') return `<span class="dash">—</span>`;
  if(val.startsWith('http')) return `<a href="${val}" target="_blank" rel="noopener">↗ Link</a>`;
  return val;
}

function renderSM(sm){
  const offHead = sm.off_hdr.map(h=>`<th>${h}</th>`).join('');
  const offBody = sm.off.map(r=>`<tr>${r.map(v=>`<td>${smCell(v)}</td>`).join('')}</tr>`).join('');
  const nonHead = sm.non_hdr.map(h=>`<th>${h}</th>`).join('');
  const nonBody = sm.non.map(r=>`<tr>${r.map(v=>`<td>${smCell(v)}</td>`).join('')}</tr>`).join('');
  const espHead = sm.esp_hdr && sm.esp_hdr.length ? `<thead><tr>${sm.esp_hdr.map(h=>`<th>${h}</th>`).join('')}</tr></thead>` : '';
  const espSection = sm.esp.length ? `
    <div class="section-title">Esports Channels</div>
    <div class="sm-table-wrap">
      <table class="sm-table">${espHead}<tbody>${sm.esp.map(r=>`<tr>${r.map(v=>`<td>${smCell(v)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>` : '';
  return `<p class="page-title">Social Media Links</p>
  <div class="section-title">Official Channels</div>
  <div class="sm-table-wrap">
    <table class="sm-table"><thead><tr>${offHead}</tr></thead><tbody>${offBody}</tbody></table>
  </div>
  <div class="section-title">Non-Official Channels</div>
  <div class="sm-table-wrap">
    <table class="sm-table"><thead><tr>${nonHead}</tr></thead><tbody>${nonBody}</tbody></table>
  </div>
  ${espSection}`;
}

// ── Navigation ────────────────────────────────────────────────
let activeId = '_index';

function getLabel(id){
  const item = RAW.nav.find(n=>n.id===id);
  return item ? item.label : id;
}

function buildNav(){
  const ul = document.getElementById('nav-list');
  RAW.nav.forEach(item => {
    const li = document.createElement('li');
    if(item.sep){ li.className='sep'; ul.appendChild(li); return; }
    li.className = 'nav-item';
    li.innerHTML = `<a href="#" data-id="${item.id}">${item.label}</a>`;
    li.querySelector('a').addEventListener('click', e => {
      e.preventDefault();
      navigate(item.id);
    });
    ul.appendChild(li);
  });
}

function navigate(id){
  activeId = id;
  document.querySelectorAll('#nav-list a').forEach(a => {
    a.classList.toggle('active', a.dataset.id === id);
  });
  document.getElementById('page-title').textContent = getLabel(id);
  document.getElementById('search').value = '';
  renderContent('');
}

function renderContent(query){
  const el = document.getElementById('content');
  const id  = activeId;
  if(id === '_index')     { el.innerHTML = renderIndex(RAW.tabs['_index']); return; }
  if(id === '_contactor') { el.innerHTML = renderContactor(RAW.tabs['_contactor']); return; }
  if(id === '_sm')        { el.innerHTML = renderSM(RAW.tabs['_sm']); return; }
  el.innerHTML = renderCards(RAW.tabs[id] || [], query);
}

// ── Search ────────────────────────────────────────────────────
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderContent(e.target.value), 120);
});

// ── Card toggle ───────────────────────────────────────────────
function toggleCard(header){
  const body    = header.nextElementSibling;
  const chevron = header.querySelector('.card-chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

// ── Init ──────────────────────────────────────────────────────
buildNav();
navigate('_index');
</script>
</body>
